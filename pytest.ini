[pytest]
python_classes = Test*
python_files = test_*.py
python_functions = test_*
markers =
    unit: Fast in-memory tests with no external services.
    contract: Stable API behavior contracts; should survive internal refactors.
    integration: Cross-module tests running in the same Python process.
    e2e: End-to-end tests that start real backend services or browsers.
    release_gate: Must-pass regression gate for release readiness.
filterwarnings =
    ignore::pytest.PytestCollectionWarning
